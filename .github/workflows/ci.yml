name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Third-party actions are pinned by full commit SHA (node24-runtime versions,
# resolved 2026-06-22). A mutable tag like @v6 can be silently retargeted;
# Dependabot bumps the SHAs (with the `# vN` comment).
jobs:
  test:
    name: gofmt + vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version: stable

      - name: Format check (gofmt -l must be empty)
        run: |
          set -euo pipefail
          unformatted=$(gofmt -l .)
          if [ -n "${unformatted}" ]; then
            echo "::error::these files are not gofmt-clean:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test (race + coverage)
        run: go test ./... -race -cover

  conformance:
    name: spec-sync + Tier-A conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # The entviz reference repo carries the algorithm spec, SPEC_VERSION, and
      # the golden conformance corpus this module is certified against.
      - name: Check out the entviz reference (spec + corpus)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: dhh1128/entviz
          path: entviz-ref
          persist-credentials: false

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version: stable

      - name: Build the conformance binary
        run: go build -o "${GITHUB_WORKSPACE}/entviz-conformance" ./cmd/entviz-conformance

      - name: Install the Tier-A harness (lxml only; no rasterizer needed)
        run: |
          set -euo pipefail
          python3 -m venv /tmp/harness
          /tmp/harness/bin/pip install --quiet --upgrade pip
          /tmp/harness/bin/pip install --quiet lxml

      # Tier A (render model) + error-rejection vectors. This both PROVES
      # conformance and SURFACES spec drift: when the reference spec is ahead of
      # this module we warn loudly but do not block unrelated PRs; when versions
      # match (or this module is ahead) it is a hard gate. No untrusted GitHub
      # event data is interpolated here (only trusted workspace paths).
      - name: Spec-version sync check + Tier-A conformance
        run: |
          set -euo pipefail
          ours=$(grep -oP 'SpecVersion = "\Kv[0-9]+' core.go)
          ref=$(grep -oP 'SPEC_VERSION = "\Kv[0-9]+' entviz-ref/src/entviz/__init__.py)
          echo "entviz-go targets spec ${ours}; reference impl/spec is ${ref}"
          bin="${GITHUB_WORKSPACE}/entviz-conformance"
          run_conformance() {
            ( cd entviz-ref \
              && PYTHONPATH=src:. /tmp/harness/bin/python -m compliance.runner \
                   --impl-cmd "${bin}" --tiers A )
          }
          if [ "${ours}" = "${ref}" ]; then
            echo "Spec versions match — conformance is a hard gate."
            run_conformance
          else
            echo "::warning title=Spec drift::reference impl/spec is ${ref} but entviz-go targets ${ours} — an upgrade is needed"
            if [ "${ref#v}" -gt "${ours#v}" ]; then
              echo "Reference is AHEAD; the corpus run is informational while this module catches up."
              run_conformance || echo "::warning title=Conformance::failed against the newer reference corpus (expected while behind)"
            else
              echo "This module is ahead of the reference — hard gate."
              run_conformance
            fi
          fi
